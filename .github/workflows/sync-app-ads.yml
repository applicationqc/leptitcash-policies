name: Sync app-ads.txt to root Pages site

on:
  push:
    branches: ["main"]
    paths:
      - "app-ads.txt"
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout leptitcash-policies
        uses: actions/checkout@v4
        with:
          path: source

      - name: Checkout applicationqc.github.io
        uses: actions/checkout@v4
        with:
          repository: applicationqc/applicationqc.github.io
          token: ${{ secrets.PAGES_DEPLOY_TOKEN }}
          path: destination

      - name: Copy app-ads.txt
        run: cp source/app-ads.txt destination/app-ads.txt

      - name: Commit and push
        run: |
          cd destination
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add app-ads.txt
          git diff --staged --quiet || (git commit -m "sync: update app-ads.txt from leptitcash-policies" && git push)
